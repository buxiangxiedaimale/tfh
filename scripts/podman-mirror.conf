# Podman 镜像加速（复制到服务器后执行下方命令）
# 适用于无法访问 registry-1.docker.io 的机器

# 安装示例（root）:
#   sudo mkdir -p /etc/containers/registries.conf.d
#   sudo cp scripts/podman-mirror.conf /etc/containers/registries.conf.d/030-mirror.conf

[[registry]]
prefix = "docker.io"
location = "docker.io"

[[registry.mirror]]
location = "docker.m.daocloud.io"

[[registry]]
prefix = "quay.io"
location = "quay.io"

[[registry.mirror]]
location = "docker.m.daocloud.io"
